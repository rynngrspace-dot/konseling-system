name: Keep Supabase Awake

on:
  schedule:
    # Run at 00:00 UTC every 3 days (Supabase pauses free tier after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg client driver
        run: npm install pg --no-save

      - name: Ping Database to Prevent Pause
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/ping-db.js
