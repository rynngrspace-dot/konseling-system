name: Keep Supabase Awake

on:
  schedule:
    # Run daily at 00:00 UTC (Supabase pauses free tier after 7 days of inactivity; daily runs are highly reliable against GitHub Actions cron delays)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  keep-awake:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Database to Prevent Pause
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is missing in GitHub repository settings!"
            echo "Please add it in: Settings -> Secrets and variables -> Actions -> Repository secrets"
            exit 1
          fi
          echo "Connecting to Supabase Database..."
          psql "$DATABASE_URL" -c "SELECT 1 as alive;"
          echo "Ping successful! Supabase Database is officially KEPT AWAKE! 🎉"
